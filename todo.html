<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List App</title>
    <script src="https://kit.fontawesome.com/f30fac2c61.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="todo.css">
</head>
<body>
    <div class="container">
        <h1>Todo List</h1>

        <form class="inputs" id="todo-form">
            <input type="text" placeholder="Enter your task" id="inp" maxlength="120" autocomplete="off">
            <button type="submit" id="add-btn">Add</button>
        </form>

        <div class="toolbar">
            <select id="filter">
                <option value="all">All</option>
                <option value="active">Active</option>
                <option value="completed">Completed</option>
            </select>
            <button type="button" id="clear-completed">Clear Completed</button>
        </div>

        <div class="stats">
            <span id="task-count">0 tasks left</span>
        </div>

        <ul class="text" id="todo-list"></ul>
        <p class="empty-state" id="empty-state">No tasks yet. Add one above.</p>
    </div>

    <script src="todo.js"></script>
</body>
</html>
